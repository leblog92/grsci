<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Refresh LDAP</title>
<style>
body{font-family:Segoe UI,sans-serif;background:#f0f4f8;color:#222;margin:0;padding:40px 20px;}
.card{max-width:600px;margin:0 auto;background:white;border-radius:12px;padding:36px;box-shadow:0 4px 24px rgba(0,0,0,.08);}
h1{color:#ff4800;margin-top:0;}
.bm-link{display:inline-block;background:#ff4800;color:white;text-decoration:none;padding:12px 24px;border-radius:8px;font-size:18px;font-weight:bold;margin:16px 0;box-shadow:0 2px 8px rgba(0,0,0,.4);}
.bm-link:hover{background:#006a94;}
ol.steps{padding:0;list-style:none;counter-reset:step;}
ol.steps li{counter-increment:step;display:flex;gap:12px;margin-bottom:14px;align-items:flex-start;}
ol.steps li::before{content:counter(step);background:#ff4800;color:white;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-weight:bold;flex-shrink:0;font-size:13px;}
.new{background:#e8f9ef;color:#1a7a4a;font-size:11px;padding:2px 7px;border-radius:10px;font-weight:bold;margin-left:6px;}
.changelog{background:#f8f9fa;border-left:3px solid #ff4800;padding:12px 16px;border-radius:0 6px 6px 0;font-size:14px;}
.changelog ul{margin:6px 0 0;padding-left:20px;}
hr{border:none;border-top:1px solid #eee;margin:28px 0;}
.compat{color:#888;font-size:13px;}
kbd{background:#eee;border:1px solid #ccc;border-radius:3px;padding:1px 5px;font-size:12px;}
.code-box{background:#1e1e1e;color:#d4d4d4;border-radius:8px;padding:14px 18px;font-family:monospace;font-size:13px;word-break:break-all;margin:12px 0;}
.video-wrap{margin:16px 0;border-radius:8px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.12);}
.video-wrap video{display:block;width:100%;}
</style>
</head>
<body>
<div class="card">
<h1>&#128073; Refresh LDAP&#8482; <small style="font-size:14px;color:#888">v1</small></h1>
<p>Glissez ce bouton dans votre barre de favoris (<kbd>Ctrl+Maj+B</kbd>) :</p>
<a class="bm-link" href="javascript:(function(){  var host = location.hostname;  var path = location.pathname.replace(/\/[^\/]*$/, '/') || '/';  var cookies = document.cookie.split(';');  var cleared = 0;  cookies.forEach(function(c) {    var name = c.split('=')[0].trim();    if (!name) return;    [path, '/', '/applis/', '/applis/Ldap-Mediatheque/'].forEach(function(p) {      document.cookie = name + '=;expires=Thu,01 Jan 1970 00:00:00 GMT;path=' + p + ';domain=' + host;      document.cookie = name + '=;expires=Thu,01 Jan 1970 00:00:00 GMT;path=' + p;    });    cleared++;  });  var lsKeys = [], ssKeys = [];  try {    for (var i = 0; i < localStorage.length; i++) lsKeys.push(localStorage.key(i));    lsKeys.forEach(function(k) { localStorage.removeItem(k); });  } catch(e) {}  try {    for (var j = 0; j < sessionStorage.length; j++) ssKeys.push(sessionStorage.key(j));    ssKeys.forEach(function(k) { sessionStorage.removeItem(k); });  } catch(e) {}  var msg = 'Cache LDAP vidé sur ' + host + ' :\n';  msg += '  Cookies supprimés : ' + cleared + '\n';  msg += '  localStorage : ' + lsKeys.length + ' clé(s)\n';  msg += '  sessionStorage : ' + ssKeys.length + ' clé(s)\n\n';  msg += 'Rechargement forcé...';  alert(msg);  location.reload(true);})();">&#128073; Refresh LDAP&#8482;</a>
</div>
</body>
</html>
